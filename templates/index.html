<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>信源汇总</title>
<script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js" integrity="sha384-H+hy9ULve6xfxRkWIh/YOtvDdpXgV2fmAGQkIDTxIgZwNoaoBal14Di2YTMR6MzR" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.4/dist/purify.min.js" integrity="sha384-eEu5CTj3qGvu9PdJuS+YlkNi7d2XxQROAFYOr59zgObtlcux1ae1Il3u7jvdCSWu" crossorigin="anonymous"></script>
<link rel="stylesheet" href="/static/css/main.css">
</head>
<body>

<!-- ════════════════ Header ════════════════ -->
<div class="header">
  <div class="header-left">
    <h1>信源汇总</h1>
    <div class="meta" id="headerMeta">加载中...</div>
  </div>
  <button class="btn-refresh" id="btnRefresh" onclick="doRefresh()">刷新</button>
  <button class="btn-refresh" onclick="promptAdminToken()" title="配置管理 Token" style="margin-left:4px;font-size:14px;">&#9881;</button>
</div>

<!-- ════════════════ Tab Navigation ════════════════ -->
<div class="tab-nav">
  <button class="tab-btn active" data-tab="news" onclick="switchTab('news')">新闻汇总</button>
  <button class="tab-btn" data-tab="hotlist" onclick="switchTab('hotlist')">热榜</button>
  <button class="tab-btn" data-tab="rss" onclick="switchTab('rss')">RSS订阅</button>
  <button class="tab-btn" data-tab="creator" onclick="switchTab('creator')">选题创作</button>
  <button class="tab-btn" data-tab="chat" onclick="switchTab('chat')">智能问答</button>
</div>

<!-- ════════════════ Tab 1: 新闻汇总 ════════════════ -->
<div class="tab-panel active" id="panel-news">
  <!-- Search + semantic toggle -->
  <div class="controls">
    <div class="search-wrap">
      <input type="text" id="newsSearchInput" placeholder="搜索标题或内容..." onkeydown="if(event.key==='Enter')doNewsSearch()">
      <button class="search-btn" onclick="doNewsSearch()" title="搜索">&#128269;</button>
    </div>
    <div class="search-mode-toggle">
      <input type="checkbox" id="semanticToggle">
      <label for="semanticToggle">语义搜索</label>
    </div>
  </div>

  <!-- Category pills -->
  <div class="category-bar" id="categoryBar"></div>

  <!-- Source pills + date slider -->
  <div class="source-row" id="sourceRow">
    <div class="source-pills" id="sourceBar"></div>
    <div class="date-range-wrap">
      <span class="date-label" id="dateLabel">全部时间</span>
      <div class="range-slider" id="rangeSlider">
        <div class="range-track"></div>
        <div class="range-fill" id="rangeFill"></div>
        <div class="range-thumb" id="thumbLeft" data-side="left"></div>
        <div class="range-thumb" id="thumbRight" data-side="right"></div>
      </div>
      <div class="range-ticks">
        <span>7天前</span><span>5天前</span><span>3天前</span><span>昨天</span><span>今天</span>
      </div>
    </div>
  </div>

  <!-- News list -->
  <div class="news-grid" id="newsGrid"></div>
</div>

<!-- ════════════════ Tab 2: 热榜 ════════════════ -->
<div class="tab-panel" id="panel-hotlist">
  <div class="controls">
    <select id="hotPlatformSelect" onchange="hotPage=1;loadHotlist()">
      <option value="">全部平台</option>
    </select>
    <select id="hotHoursSelect" onchange="hotPage=1;loadHotlist()">
      <option value="6">6 小时内</option>
      <option value="12">12 小时内</option>
      <option value="24" selected>24 小时内</option>
      <option value="48">48 小时内</option>
      <option value="72">72 小时内</option>
    </select>
  </div>
  <div class="news-grid" id="hotGrid"></div>
</div>

<!-- ════════════════ Tab 3: RSS订阅 ════════════════ -->
<div class="tab-panel" id="panel-rss">
  <div class="controls">
    <select id="rssFeedSelect" onchange="rssPage=1;loadRSS()">
      <option value="">全部订阅源</option>
    </select>
    <div class="search-wrap">
      <input type="text" id="rssSearchInput" placeholder="搜索 RSS 条目..." onkeydown="if(event.key==='Enter'){rssPage=1;loadRSS();}">
      <button class="search-btn" onclick="rssPage=1;loadRSS();" title="搜索">&#128269;</button>
    </div>
    <button class="btn-manage" onclick="openFeedModal()">管理订阅源</button>
  </div>
  <div class="news-grid" id="rssGrid"></div>
</div>

<!-- ════════════════ RSS Feed Management Modal ════════════════ -->
<div class="modal-overlay" id="feedModal">
  <div class="modal">
    <div class="modal-header">
      <h2>管理 RSS 订阅源</h2>
      <button class="modal-close" onclick="closeFeedModal()">&times;</button>
    </div>

    <!-- Add feed form -->
    <div class="add-feed-form" id="addFeedForm">
      <div class="form-row">
        <label>名称</label>
        <input type="text" id="newFeedName" placeholder="例如: Hacker News">
      </div>
      <div class="form-row">
        <label>URL</label>
        <input type="text" id="newFeedUrl" placeholder="https://example.com/feed.xml">
      </div>
      <div class="form-row" style="justify-content:flex-end;">
        <button class="btn-cancel" onclick="closeAddForm()">取消</button>
        <button class="btn-add" id="btnAddFeed" onclick="addFeed()">添加</button>
      </div>
    </div>

    <!-- Discover section -->
    <div class="discover-section" style="margin-bottom:12px;padding:12px;background:var(--bg);border-radius:8px;border:1px solid var(--border);">
      <div style="display:flex;gap:8px;align-items:center;">
        <input type="text" id="discoverUrl" placeholder="输入网站地址，如 36kr.com" style="flex:1;padding:6px 10px;background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--fg);font-size:13px;">
        <button class="btn-add" id="btnDiscover" onclick="discoverFeeds()" style="white-space:nowrap;">发现</button>
      </div>
      <div id="discoverResult" style="margin-top:8px;display:none;"></div>
      <!-- Custom selector form (hidden by default) -->
      <div id="customSelectorForm" style="margin-top:8px;display:none;padding:8px;background:var(--card);border-radius:6px;border:1px solid var(--border);">
        <div style="font-size:12px;color:var(--muted);margin-bottom:6px;">自定义 CSS 选择器（适用于未匹配的网站）</div>
        <div style="display:flex;gap:6px;align-items:center;margin-bottom:4px;">
          <label style="font-size:12px;width:70px;flex-shrink:0;">条目选择器</label>
          <input type="text" id="customItemSelector" placeholder="如 article 或 .post" style="flex:1;padding:4px 8px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--fg);font-size:12px;">
        </div>
        <div style="display:flex;gap:6px;align-items:center;">
          <label style="font-size:12px;width:70px;flex-shrink:0;">标题选择器</label>
          <input type="text" id="customTitleSelector" placeholder="如 h2 或 .title（可选）" style="flex:1;padding:4px 8px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--fg);font-size:12px;">
        </div>
        <div style="margin-top:6px;display:flex;gap:6px;justify-content:flex-end;">
          <button class="btn-cancel" onclick="document.getElementById('customSelectorForm').style.display='none'" style="padding:3px 10px;font-size:12px;">取消</button>
          <button class="btn-add" onclick="customDiscover()" style="padding:3px 10px;font-size:12px;">生成</button>
        </div>
      </div>
    </div>

    <button class="btn-add" id="btnShowAddForm" onclick="showAddForm()" style="margin-bottom:12px;">+ 添加订阅源</button>

    <!-- Feed table -->
    <table class="feed-table">
      <thead>
        <tr>
          <th>名称</th>
          <th>URL</th>
          <th>状态</th>
          <th>启用</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="feedTableBody"></tbody>
    </table>
  </div>
</div>

<!-- ════════════════ Tab 4: 选题创作 ════════════════ -->
<div class="tab-panel" id="panel-creator">

  <!-- Step 1: 选题 -->
  <div id="creatorTopicView">
    <div class="controls">
      <select id="topicIndustry" style="min-width:130px;">
        <option value="">选择行业</option>
      </select>
      <div class="search-wrap">
        <input type="text" id="topicKeyword" placeholder="输入关键词，如 大模型、新能源..." onkeydown="if(event.key==='Enter')generateTopics()">
        <button class="search-btn" onclick="generateTopics()" title="生成选题">&#128269;</button>
      </div>
      <button class="btn-refresh" onclick="generateTopics()" id="btnGenTopic">生成选题</button>
    </div>
    <!-- 选题结果 -->
    <div id="topicResults" class="news-grid"></div>

    <!-- 热榜浏览（填补选题下方空间） -->
    <div class="hotlist-browser" id="hotlistBrowser">
      <div class="hotlist-sidebar" id="hotlistSidebar"></div>
      <div class="hotlist-main">
        <div id="hotlistHeader" style="font-size:15px;font-weight:600;padding:8px 0;color:var(--muted);">选择平台查看热榜</div>
        <div id="hotlistItems" class="hotlist-items"></div>
      </div>
    </div>
  </div>

  <!-- Step 2: 框架 + 文章 -->
  <div id="creatorFrameworkView" style="display:none;">
    <div class="controls" style="justify-content:space-between;">
      <div style="display:flex;gap:8px;align-items:center;">
        <button class="btn-refresh" onclick="backToTopic()">&#8592; 返回选题</button>
        <span id="fwTitle" style="font-weight:600;color:var(--accent);"></span>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <label style="font-size:13px;color:var(--muted);">配图数量</label>
        <select id="imageCount" style="padding:6px 12px;">
          <option value="0">不配图</option>
          <option value="1">1 张</option>
          <option value="2">2 张</option>
          <option value="3" selected>3 张</option>
          <option value="4">4 张</option>
          <option value="5">5 张</option>
        </select>
        <button class="btn-refresh" onclick="confirmAndGenerate()" id="btnGenArticle" style="background:var(--accent);color:#fff;border-color:var(--accent);">确认框架并生成文章</button>
      </div>
    </div>

    <!-- 框架面板（可收缩） -->
    <div id="fwPanelWrapper" class="fw-panel-wrapper">
      <div class="fw-panel-header" onclick="toggleFwPanel()">
        <span>文案框架</span>
        <span id="fwToggleIcon">&#9660;</span>
      </div>
      <div id="fwPanelBody" class="fw-panel-body">
        <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:flex-start;">
          <div style="flex:1;min-width:300px;">
            <div class="fw-label">文章结构 <span style="font-weight:400;font-size:11px;color:var(--muted);">（可直接编辑）</span></div>
            <textarea id="fwStructure" class="fw-edit-area" rows="2" placeholder="输入文章结构..."></textarea>
          </div>
          <div style="flex:2;min-width:300px;">
            <div class="fw-label">切入点+创作维度 <span style="font-weight:400;font-size:11px;color:var(--muted);">（可直接编辑）</span></div>
            <textarea id="fwApproach" class="fw-edit-area" rows="4" placeholder="输入切入点..."></textarea>
          </div>
        </div>
        <div style="margin-top:8px;display:flex;gap:8px;justify-content:flex-end;">
          <button class="btn-refresh" onclick="saveFrameworkEdit()" style="font-size:12px;">保存编辑</button>
        </div>
        <!-- 对话调整 -->
        <div style="margin-top:12px;">
          <div style="font-size:13px;color:var(--muted);margin-bottom:6px;">对话调整</div>
          <div id="fwChatHistory" class="fw-chat-history"></div>
          <div style="display:flex;gap:8px;margin-top:8px;">
            <input type="text" id="fwChatInput" placeholder="输入调整意见..." style="flex:1;padding:8px 12px;background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--fg);font-size:13px;" onkeydown="if(event.key==='Enter')sendFrameworkChat()">
            <button class="btn-refresh" onclick="sendFrameworkChat()">发送</button>
            <button class="btn-refresh" onclick="sendFrameworkChat(true)" title="整体重生成">重生成</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 文章面板 -->
    <div id="articlePanel" style="display:none;padding:0 32px;">
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px;">
        <h3 style="margin:0;">生成结果</h3>
        <div style="display:flex;gap:4px;margin-left:auto;">
          <button class="btn-refresh" id="btnPreviewMode" onclick="setArticleMode('preview')" style="background:var(--accent);color:#fff;border-color:var(--accent);">预览</button>
          <button class="btn-refresh" id="btnEditMode" onclick="setArticleMode('edit')">编辑</button>
        </div>
      </div>
      <div id="articleStatus" style="padding:40px;text-align:center;color:var(--muted);">
        <div class="spinner"></div>
        <div style="margin-top:12px;">正在生成文章，请稍候...</div>
      </div>
      <!-- 预览模式 -->
      <div id="articlePreview" class="markdown-body" style="display:none;"></div>
      <!-- 编辑模式 -->
      <textarea id="articleEditor" class="article-editor" style="display:none;" oninput="onArticleEdit()"></textarea>
    </div>
  </div>
</div>

<!-- ════════════════ Tab 5: 智能问答 ════════════════ -->
<div class="tab-panel" id="panel-chat">
  <div class="chat-layout">
    <div class="chat-sidebar">
      <button class="chat-new-btn" onclick="createNewChat()">+ 新建对话</button>
      <div class="chat-session-list" id="chatSessionList"></div>
    </div>
    <div class="chat-main">
      <div class="chat-messages" id="chatMessages">
        <div class="chat-empty">选择或新建一个对话开始提问</div>
      </div>
      <div class="chat-input-area">
        <textarea id="chatInput" placeholder="输入你的问题... (Enter 发送, Shift+Enter 换行)"
                  rows="2" onkeydown="handleChatKeydown(event)"></textarea>
        <button class="chat-send-btn" onclick="sendChatMessage()" id="chatSendBtn">发送</button>
      </div>
    </div>
  </div>
</div>

<!-- ════════════════ JavaScript ════════════════ -->
<script src="/static/js/app.js"></script>
</body>
</html>
