scheduler:
  news_interval: 600
  hotlist_interval: 300
  rss_interval: 1800
  purge_days: 7

aktools:
  base_url: "http://127.0.0.1:8080/api/public"   # AKTools API 地址，也可通过环境变量 AKTOOLS_BASE_URL 配置

archive:
  enabled: false              # 启用热/冷归档（生产环境设为 true）
  archive_days: 7             # 超过 N 天的数据迁移到冷库
  retention_days: 180         # 冷库数据保留 N 天后清理

hotlist:
  platforms:
    - weibo
    - zhihu
    - bilibili-hot-search
    - toutiao
    - baidu
    - wallstreetcn-hot
    - thepaper
    - cls-hot
    - ifeng
    - douyin
    - tieba
  api_url: "https://newsnow.busiyi.world/api/s"

ai:
  enabled: false
  model: "deepseek/deepseek-chat"
  # api_key 和 base_url 请通过环境变量 AI_API_KEY / AI_BASE_URL 配置
  api_key: ""
  base_url: ""
  interests: ""

vector:
  model: "BAAI/bge-small-zh-v1.5"
  dedup_threshold: 0.78
  cluster_threshold: 0.85

rsshub:
  base_url: "http://127.0.0.1:1200"
  # sites 配置与 config.yaml 相同，此处省略

agent:
  enabled: true
  max_iterations: 8

wcf:
  enabled: false
  url: "http://127.0.0.1:17890"    # wcfLink HTTP 服务地址
  poll_interval: 3                   # 事件轮询间隔（秒）
  event_batch_size: 100              # 单次拉取事件数量上限
  agent_enabled: true                # 非指令消息是否转 Agent 处理
  agent_timeout: 60                  # Agent 响应超时秒数
  agent_thinking_msg: "正在思考，请稍候..."  # Agent 处理中提示语
  commands:
    help: ["帮助", "菜单"]
    list: ["监控列表", "列表"]
    report: ["报告", "日报", "监控"]

monitor:
  enabled: true
  check_interval: 60           # 检查到期任务的间隔（秒）
  schedules:
    daily_morning: "08:00"
    daily_evening: "20:00"

wechat_mp:
  enabled: false
  method: "rsshub"             # rsshub | werss | custom
  service_url: ""              # method=custom 时填外部 API 地址
  werss_url: ""                # method=werss 时填 WeRSS 实例地址（如 http://127.0.0.1:4000）

rss_search:
  backends:
    - feedly                   # Feedly Cloud Search（免费，无需 Key）
    - internal                 # 基于现有语义搜索
  feedly_locale: "zh"
  max_results: 10
  verify_feeds: true           # 是否验证 Feed 可访问性
