scheduler:
  news_interval: 600
  hotlist_interval: 300
  rss_interval: 1800
  purge_days: 7

archive:
  enabled: false              # 启用热/冷归档（生产环境设为 true）
  archive_days: 7             # 超过 N 天的数据迁移到冷库
  retention_days: 180         # 冷库数据保留 N 天后清理

hotlist:
  platforms:
    - weibo
    - zhihu
    - bilibili-hot-search
    - toutiao
    - baidu
    - wallstreetcn-hot
    - thepaper
    - cls-hot
    - ifeng
    - douyin
    - tieba
  api_url: "https://newsnow.busiyi.world/api/s"

ai:
  enabled: false
  model: "deepseek/deepseek-chat"
  # api_key 和 base_url 请通过环境变量 AI_API_KEY / AI_BASE_URL 配置
  api_key: ""
  base_url: ""
  interests: ""

vector:
  model: "BAAI/bge-small-zh-v1.5"
  dedup_threshold: 0.78
  cluster_threshold: 0.85

rsshub:
  base_url: "http://127.0.0.1:1200"
  # sites 配置与 config.yaml 相同，此处省略

agent:
  enabled: true
  max_iterations: 8

wcf:
  enabled: false
  url: "http://127.0.0.1:17890"    # wcfLink HTTP 服务地址
  poll_interval: 3                   # 事件轮询间隔（秒）
  event_batch_size: 100              # 单次拉取事件数量上限
  commands:
    help: ["帮助", "菜单"]
    list: ["监控列表", "列表"]
    report: ["报告", "日报", "监控"]

monitor:
  enabled: true
  check_interval: 60           # 检查到期任务的间隔（秒）
  schedules:
    daily_morning: "08:00"
    daily_evening: "20:00"
