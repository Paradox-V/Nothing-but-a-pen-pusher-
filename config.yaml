scheduler:
  news_interval: 600
  hotlist_interval: 300
  rss_interval: 1800
  purge_days: 7

hotlist:
  platforms:
    - weibo
    - zhihu
    - bilibili-hot-search
    - toutiao
    - baidu
    - wallstreetcn-hot
    - thepaper
    - cls-hot
    - ifeng
    - douyin
    - tieba
  api_url: "https://newsnow.busiyi.world/api/s"

ai:
  enabled: false
  model: "deepseek/deepseek-chat"
  api_key: ""
  base_url: ""
  interests: ""

vector:
  model: "BAAI/bge-small-zh-v1.5"
  dedup_threshold: 0.78
  cluster_threshold: 0.85

rsshub:
  base_url: "http://127.0.0.1:1200"
  sites:
    36kr.com:
      name: "36氪"
      routes:
        - path: /36kr/newsflashes
          name: "快讯"
        - path: /36kr/information/web_news
          name: "资讯"
    sspai.com:
      name: "少数派"
      routes:
        - path: /sspai/matrix
          name: "Matrix"
        - path: /sspai/index
          name: "首页"
    ithome.com:
      name: "IT之家"
      routes:
        - path: /ithome/ranking/daily
          name: "日榜"
        - path: /ithome/ranking/weekly
          name: "周榜"
    zhihu.com:
      name: "知乎"
      routes:
        - path: /zhihu/hot
          name: "热榜"
        - path: /zhihu/daily
          name: "日报"
    weibo.com:
      name: "微博"
      routes:
        - path: /weibo/search/hot
          name: "热搜"
    bilibili.com:
      name: "B站"
      routes:
        - path: /bilibili/hot-search
          name: "热搜"
        - path: /bilibili/ranking/all
          name: "全站排行"
    douyin.com:
      name: "抖音"
      routes:
        - path: /douyin/trending
          name: "热点"
    thepaper.cn:
      name: "澎湃新闻"
      routes:
        - path: /thepaper/channel/hotnews
          name: "热点"
        - path: /thepaper/channel/finance
          name: "财经"
    cls.cn:
      name: "财联社"
      routes:
        - path: /cls/telegraph
          name: "电报"
    wallstreetcn.com:
      name: "华尔街见闻"
      routes:
        - path: /wallstreetcn/news/global
          name: "全球"
        - path: /wallstreetcn/news/a-stock
          name: "A股"
    ifeng.com:
      name: "凤凰网"
      routes:
        - path: /ifeng/news/cdp
          name: "热点"
    baidu.com:
      name: "百度"
      routes:
        - path: /baidu/topwords
          name: "热搜词"
    toutiao.com:
      name: "今日头条"
      routes:
        - path: /toutiao/hot
          name: "热榜"
    douban.com:
      name: "豆瓣"
      routes:
        - path: /douban/explore/column/hot
          name: "热门"
    juejin.cn:
      name: "稀土掘金"
      routes:
        - path: /juejin/trending/all/monthly
          name: "月榜"
        - path: /juejin/trending/frontend/monthly
          name: "前端月榜"
    github.com:
      name: "GitHub"
      routes:
        - path: /github/trending/daily/any
          name: "Trending"
    producthunt.com:
      name: "Product Hunt"
      routes:
        - path: /producthunt/today
          name: "今日"
    news.ycombinator.com:
      name: "Hacker News"
      routes:
        - path: /hackernews/best
          name: "Best"
        - path: /hackernews/new
          name: "New"
    techcrunch.com:
      name: "TechCrunch"
      routes:
        - path: /techcrunch
          name: "全部"
    arxiv.org:
      name: "Arxiv"
      routes:
        - path: /arxiv/list/cs.AI/recent
          name: "AI"
        - path: /arxiv/list/cs.LG/recent
          name: "ML"
    pbc.gov.cn:
      name: "中国人民银行"
      routes:
        - path: /gov/pbc/gzlw
          name: "工作论文"
        - path: /gov/pbc/zcyj
          name: "政策研究"
    stats.gov.cn:
      name: "国家统计局"
      routes:
        - path: /gov/stats/sj/zxfb
          name: "数据发布"
        - path: /gov/stats/sj/sjjd
          name: "数据解读"
    gov.cn:
      name: "中国政府网"
      routes:
        - path: /gov/zhengce/zuixin
          name: "最新政策"
        - path: /gov/zhengce/zhengceku/bmwj
          name: "政策文件库"
